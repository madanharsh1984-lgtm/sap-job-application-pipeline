version: "3.9"

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  browser-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
