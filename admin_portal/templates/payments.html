<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments — Admin Portal</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="app-layout">
    <nav class="sidebar">
        <div class="sidebar-brand">
            SAP Pipeline
            <small>Admin Portal v1</small>
        </div>
        <ul class="sidebar-nav">
            <li><a href="/dashboard"><span class="icon">📊</span> Dashboard</a></li>
            <li><a href="/users"><span class="icon">👥</span> Users</a></li>
            <li><a href="/payments" class="active"><span class="icon">💳</span> Payments</a></li>
            <li><a href="/jobs"><span class="icon">💼</span> Jobs &amp; Applications</a></li>
            <li><a href="/system-logs"><span class="icon">📋</span> System Logs</a></li>
            <li><a href="/settings"><span class="icon">⚙️</span> Settings</a></li>
            <li><a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>💳 Payment Management</h1>
        </div>

        <div id="payments-alert" class="alert"></div>

        <div class="search-bar">
            <select id="payment-status" class="form-control" onchange="loadPayments()">
                <option value="">All Status</option>
                <option value="success">Success</option>
                <option value="failed">Failed</option>
                <option value="pending">Pending</option>
                <option value="refunded">Refunded</option>
            </select>
            <button class="btn btn-outline btn-sm" onclick="loadPayments()">↻ Refresh</button>
        </div>

        <div class="card">
            <div class="card-header"><h3>All Transactions</h3></div>
            <div class="card-body">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Plan</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="payments-tbody">
                        <tr><td colspan="7" class="empty-state"><p>Loading...</p></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="pagination" id="payments-pagination"></div>
    </main>
</div>

<script src="/static/js/admin.js"></script>
<script>loadPayments();</script>
</body>
</html>
