<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — SAP Pipeline</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>🔐 Admin Portal</h1>
        <p class="subtitle">SAP Job Application Pipeline</p>

        <div id="login-alert" class="alert"></div>

        <!-- Login Form -->
        <div id="login-form-container">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
            </form>
            <p style="text-align:center;margin-top:16px;font-size:13px;color:#64748b">
                First time? <a href="#" onclick="showSetup()">Create Admin Account</a>
            </p>
        </div>

        <!-- Setup Form (hidden by default) -->
        <div id="setup-form-container" style="display:none">
            <div id="setup-alert" class="alert"></div>
            <form onsubmit="handleSetup(event)">
                <div class="form-group">
                    <label for="setup-name">Name</label>
                    <input type="text" id="setup-name" class="form-control" placeholder="Admin Name" required>
                </div>
                <div class="form-group">
                    <label for="setup-email">Email</label>
                    <input type="email" id="setup-email" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="setup-password">Password</label>
                    <input type="password" id="setup-password" class="form-control" placeholder="Min 8 characters" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Create Admin Account</button>
            </form>
            <p style="text-align:center;margin-top:16px;font-size:13px;color:#64748b">
                Already have an account? <a href="#" onclick="showLogin()">Sign In</a>
            </p>
        </div>
    </div>
</div>

<script src="/static/js/admin.js"></script>
<script>
    // Redirect if already logged in
    if (getToken()) window.location.href = '/dashboard';

    function showSetup() {
        document.getElementById('login-form-container').style.display = 'none';
        document.getElementById('setup-form-container').style.display = 'block';
    }
    function showLogin() {
        document.getElementById('setup-form-container').style.display = 'none';
        document.getElementById('login-form-container').style.display = 'block';
    }
</script>
</body>
</html>
