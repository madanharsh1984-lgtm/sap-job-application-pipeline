# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path prepend to ensure the project is importable
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename. Defaults to the empty string meaning UTC.
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .hierarchyConfig to be populated
# with the revision base(s) when --hierarchyConfig is not used
# splice = false

# set to 'true' to apply the revision to the head
# without requiring a downgrade step
# heads_only = false

# the output encoding used by revision files
# output_encoding = utf-8

# placeholder — overridden by env.py at runtime
sqlalchemy.url = postgresql://postgres:postgres@db:5432/jobaccelerator


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
