services:
  postgres:
    image: postgres:16-alpine
    container_name: sap_postgres
    environment:
      POSTGRES_DB: sap_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: sap_redis
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sap_backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sap_pipeline
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:3000
    ports:
      - '8000:8000'
    volumes:
      - ./:/workspace

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sap_worker
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sap_pipeline
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:3000
    command: celery -A app.celery_app.celery_app worker --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sap_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
