services:
  postgres:
    image: postgres:16-alpine
    container_name: sap_postgres
    environment:
      POSTGRES_DB: sap_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: sap_redis
    ports:
      - '6379:6379'
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sap_backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sap_pipeline
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:3000
      APIFY_TOKEN: ${APIFY_TOKEN}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-harvestapi~linkedin-post-search}
      APIFY_MAX_POSTS: ${APIFY_MAX_POSTS:-50}
      APIFY_MAX_CONCURRENT_RUNS: ${APIFY_MAX_CONCURRENT_RUNS:-2}
      APIFY_CONCURRENCY_WAIT_SECONDS: ${APIFY_CONCURRENCY_WAIT_SECONDS:-180}
      APIFY_CONCURRENCY_POLL_SECONDS: ${APIFY_CONCURRENCY_POLL_SECONDS:-3}
      APIFY_RUN_STATUS_MAX_POLLS: ${APIFY_RUN_STATUS_MAX_POLLS:-30}
      APIFY_RUN_STATUS_POLL_SECONDS: ${APIFY_RUN_STATUS_POLL_SECONDS:-2}
    ports:
      - '8000:8000'
    networks:
      - app_network
    volumes:
      - ./:/workspace

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sap_worker
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sap_pipeline
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:3000
      APIFY_TOKEN: ${APIFY_TOKEN}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-harvestapi~linkedin-post-search}
      APIFY_MAX_POSTS: ${APIFY_MAX_POSTS:-50}
      APIFY_MAX_CONCURRENT_RUNS: ${APIFY_MAX_CONCURRENT_RUNS:-2}
      APIFY_CONCURRENCY_WAIT_SECONDS: ${APIFY_CONCURRENCY_WAIT_SECONDS:-180}
      APIFY_CONCURRENCY_POLL_SECONDS: ${APIFY_CONCURRENCY_POLL_SECONDS:-3}
      APIFY_RUN_STATUS_MAX_POLLS: ${APIFY_RUN_STATUS_MAX_POLLS:-30}
      APIFY_RUN_STATUS_POLL_SECONDS: ${APIFY_RUN_STATUS_POLL_SECONDS:-2}
    command: celery -A app.celery_app.celery_app worker -Q celery,automation --loglevel=info
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sap_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - '3000:3000'
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
